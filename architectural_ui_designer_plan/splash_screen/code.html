<style>
        .fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

            animation: fadeIn 1.2s ease-out 0.5s forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            to {

                transform: translateY(0);
            }
        }
