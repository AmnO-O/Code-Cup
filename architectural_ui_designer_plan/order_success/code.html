<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Order Success</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">

                    colors: {

                        "inverse-primary": "#ecbca8",

                        "accent-container": "#FBE3DA",
                        "on-surface": "#1c1c19",
                        "surface-container-low": "#f7f3ee",
                        "surface-tint": "#7a5646",
                        "on-tertiary-fixed": "#022100",
                        "secondary-fixed": "#ffdbd1",
                        "on-secondary-container": "#6f1a00",
                        "secondary-fixed-dim": "#ffb5a0",
                        "tertiary": "#022400",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#c0f0ad",
                        "on-surface-variant": "#6E5B4E",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#ffdbcc",
                        "on-secondary-fixed": "#3b0a00",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#7aa76b",
                        "primary": "#31170b",
                        "surface": "#FFFFFF",
                        "tertiary-fixed-dim": "#a4d393",
                        "tertiary-container": "#143b0b",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary": "#a53c1b",
                        "on-primary-container": "#be927f",
                        "on-primary-fixed-variant": "#603f30",
                        "background": "#fdf9f4",
                        "on-background": "#1c1c19",
                        "outline-variant": "#d4c3bc",
                        "surface-container-high": "#ebe8e3",
                        "on-primary-fixed": "#2e1508",
                        "outline": "#E4D6C9",
                        "primary-fixed-dim": "#ecbca8",
                        "on-tertiary-fixed-variant": "#28501e",
                        "surface-container-highest": "#e5e2dd",
                        "surface-container": "#f1ede8",
                        "inverse-surface": "#31302d",
                        "on-secondary-fixed-variant": "#842504",
                        "surface-variant": "#e5e2dd",
                        "on-tertiary": "#ffffff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "base": "4px",
                        "lg": "24px",
                        "sm": "12px",
                        "md": "16px",
                        "xl": "32px",
                        "margin": "16px",
                        "xs": "8px",
                        "gutter": "12px"
                    },
                    fontFamily: {
                        "price-display": ["Poppins"],
                        "body-md": ["Inter"],
                        "caption": ["Inter"],
                        "display-hero": ["Poppins"],
                        "title-md": ["Poppins"],
                        "headline-lg": ["Poppins"],
                        "label-md": ["Inter"]
                    },
                    fontSize: {
                        "price-display": ["18px", { lineHeight: "22px", fontWeight: "600" }],
                        "body-md": ["15px", { lineHeight: "20px", fontWeight: "400" }],
                        "caption": ["12px", { lineHeight: "16px", fontWeight: "400" }],
                        "display-hero": ["28px", { lineHeight: "34px", fontWeight: "600" }],
                        "title-md": ["17px", { lineHeight: "22px", fontWeight: "500" }],
                        "headline-lg": ["22px", { lineHeight: "28px", fontWeight: "600" }],
                        "label-md": ["13px", { lineHeight: "16px", fontWeight: "500" }]

                }
            }
        }
    </script>
<style>
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #f00;
            opacity: 0;
        }
        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="h-full bg-background text-on-background flex flex-col justify-center items-center overflow-hidden">
<div class="absolute inset-0 pointer-events-none z-0" id="confetti-container"></div>
<main class="w-full max-w-md px-margin py-xl flex flex-col items-center text-center z-10 relative">
<div class="w-24 h-24 bg-surface rounded-full flex items-center justify-center outline outline-1 outline-outline shadow-md mb-lg">
<span class="material-symbols-outlined text-secondary" style="font-size: 48px; font-variation-settings: 'FILL' 1;">
                check_circle
            </span>
</div>
<h1 class="font-display-hero text-display-hero text-primary mb-sm">Order Placed!</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl max-w-[280px]">
            Your artisan coffee is being crafted with care. We'll let you know when it's on the way.
        </p>
<div class="w-full bg-surface rounded-xl outline outline-1 outline-outline p-md mb-xl flex flex-col items-center">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-xs">Order Number</span>
<span class="font-title-md text-title-md text-primary tracking-widest">#AC-78294</span>
</div>
<div class="w-full flex flex-col gap-sm">
<button class="w-full h-12 bg-[#C1502E] text-white font-title-md text-title-md rounded-full flex items-center justify-center shadow-sm active:scale-95 transition-transform duration-150">
                Track My Order
            </button>
<button class="w-full h-12 bg-primary-container text-primary-fixed font-title-md text-title-md rounded-lg flex items-center justify-center active:scale-95 transition-transform duration-150">
                Back to Home
            </button>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#C1502E', '#4A2C1E', '#F3E4D7', '#E4D6C9'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = `${Math.random() * 100}vw`;
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animation = `fall ${Math.random() * 3 + 2}s linear forwards`;
                confetti.style.animationDelay = `${Math.random() * 2}s`;
                
                // Add some variety in shapes
                if (Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                }
                
                container.appendChild(confetti);
            }
        });
    </script>
</body></html>
