<p class="font-body-md text-body-md text-on-surface-variant">Smooth espresso with creamy oat milk and a touch of real vanilla bean syrup.</p>
</div>

<!-- Customization: Size -->

<button class="flex-1 py-sm px-md rounded-full border border-solid chip-unselected font-label-md text-label-md transition-colors" onclick="selectChip(this, 'size')">Small (8oz)</button>
<button class="flex-1 py-sm px-md rounded-full border border-solid chip-selected font-label-md text-label-md transition-colors" onclick="selectChip(this, 'size')">Medium (12oz)</button>
<button class="flex-1 py-sm px-md rounded-full border border-solid chip-unselected font-label-md text-label-md transition-colors" onclick="selectChip(this, 'size')">Large (16oz)</button>

<div class="flex gap-sm flex-wrap">

<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>

</button>

</div>

<span>Add to Cart</span>
<span class="material-symbols-outlined text-[20px]" data-icon="shopping_cart">shopping_cart</span>
</button>

</div>
<script>
        const basePrice = 5.50;
        let quantity = 1;

        function updateQuantity(change) {
            const newQuantity = quantity + change;
            if (newQuantity >= 1 && newQuantity <= 10) {
                quantity = newQuantity;
                document.getElementById('quantity-display').innerText = quantity;
                updatePrice();
            }
        }

        function updatePrice() {
            // In a real app, this would calculate based on selected options too (e.g. triple shot)
            const total = (basePrice * quantity).toFixed(2);
            document.getElementById('price-display').innerText = `$${total}`;
        }

        function selectChip(clickedBtn, groupName) {
            // Find all buttons in the same container (group)
            const container = clickedBtn.parentElement;
            const buttons = container.querySelectorAll('button');
            
            // Deselect all
            buttons.forEach(btn => {
                btn.classList.remove('chip-selected');
                btn.classList.add('chip-unselected');
            });
            
            // Select clicked
            clickedBtn.classList.remove('chip-unselected');
            clickedBtn.classList.add('chip-selected');
        }
    </script>
