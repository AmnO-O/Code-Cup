<p class="font-body-md text-body-md text-on-surface-variant text-center">alex.johnson@example.com</p>

<span class="font-title-md text-title-md text-primary">850</span>
<span class="font-caption text-caption text-on-surface-variant">Points</span>
</div>
<div class="bg-surface rounded-xl p-md flex flex-col items-center justify-center outline outline-1 outline-outline shadow-sm hover:bg-surface-container-low transition-colors duration-200">

                        Alex Johnson
                    </div>
</div>
<div>

<span class="material-symbols-outlined mr-sm text-on-surface-variant text-[20px]" data-icon="phone">phone</span>
