    body {

<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col pt-14 pb-[160px] md:pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-background dark:bg-on-background w-full">
<div class="flex justify-between items-center w-full px-margin h-14 bg-background dark:bg-on-background">
<button aria-label="Close" class="w-12 h-12 flex items-center justify-center text-primary dark:text-primary-fixed hover:bg-surface-container-low dark:hover:bg-primary-container rounded-full active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<h1 class="font-display-hero text-display-hero text-primary dark:text-primary-fixed font-bold">My Cart</h1>
<div class="w-12"></div> <!-- Spacer for center alignment -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-margin pt-lg max-w-2xl mx-auto w-full flex flex-col gap-sm">
<!-- Cart Item 1 -->
<div class="relative bg-surface rounded-xl overflow-hidden border border-outline flex items-center p-sm">
<!-- Background swipe-to-remove affordance (visual only) -->
<div class="absolute inset-y-0 right-0 w-20 bg-error flex items-center justify-center opacity-0">
<span class="material-symbols-outlined text-on-error">delete</span>
</div>
<div class="flex-shrink-0 w-20 h-20 rounded-lg overflow-hidden bg-surface-container-low mr-md">
<img alt="Cappuccino" class="w-full h-full object-cover" data-alt="A top-down shot of a beautifully crafted artisanal cappuccino in a white ceramic cup. The cappuccino features intricate latte art of a rosetta on top of rich, dark crema. It sits on a warm wooden cafe table next to a silver spoon. Soft, natural morning light filters in, creating a cozy and inviting atmosphere typical of a high-end specialty coffee shop." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCTl9QIbLwjkcrVCakfc5Il2e_JerG6Vs6pCzn4UepL8cO6AueEYc5qtvRKKGWpyALzYyNEii2ZP6mN7IgdcPyoWR78v8Admiiua_frccPS3RqWEnjNMNF1jZOigzJvG6wjILfRwxpfCyJm7DhGiSWXnW6FkjDeE8luP7vDz16rnLuiZbUT99a-_IK8PvbEbOJGPOmZhX5WAADMgAlTMEOW-foqmH96lRubTd5unaiuR7InQqo1doAf"/>
</div>
<div class="flex-grow flex flex-col justify-center">
<h3 class="font-title-md text-title-md text-on-surface">Oat Milk Cappuccino</h3>
<p class="font-caption text-caption text-on-surface-variant mt-xs">Medium, Double Shot, Extra Hot</p>
<div class="flex items-center justify-between mt-sm">
<span class="font-price-display text-price-display text-primary">$5.50</span>
<div class="flex items-center bg-surface-container-low rounded-full px-xs py-1 border border-outline">
<button aria-label="Decrease quantity" class="w-8 h-8 flex items-center justify-center text-on-surface hover:bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-[20px]">remove</span>
</button>
<span class="font-title-md text-title-md text-on-surface w-8 text-center">1</span>
<button aria-label="Increase quantity" class="w-8 h-8 flex items-center justify-center text-on-surface hover:bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
</div>
</div>
</div>
<!-- Cart Item 2 -->
<div class="relative bg-surface rounded-xl overflow-hidden border border-outline flex items-center p-sm">
<div class="flex-shrink-0 w-20 h-20 rounded-lg overflow-hidden bg-surface-container-low mr-md">
<img alt="Croissant" class="w-full h-full object-cover" data-alt="A macro shot of a flaky, golden-brown butter croissant resting on a minimalist white ceramic plate. The pastry is beautifully layered, showing off its crisp texture. The setting is a bright, modern artisan cafe with a light, airy aesthetic. The background is softly blurred to emphasize the tactile quality of the croissant, lit by gentle, diffused daylight." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC8nv2ztB4oBJ0Lb4f3QGPQ4PwqcIpQbY8PcFibDZmfEHvGpT1VpRUlDSbfj0_aWHh3iW7ydsR9wXFhi18xY8O4WfZk8xPOybAkw0k-xpfyjh0FfIcOoqM14txLyBzOptQhrgTrD47EDbxnwyJRDCfKLFxF9Cr5nsCIY-6Pb17GVD-HtZVjiM8tID4thxFOHwm7hXEunT1zkalVpGbhd80tLDOs2ByfJ8zHE8TJ1qHzw5_cR-pwpys3"/>
</div>
<div class="flex-grow flex flex-col justify-center">
<h3 class="font-title-md text-title-md text-on-surface">Butter Croissant</h3>
<p class="font-caption text-caption text-on-surface-variant mt-xs">Warmed</p>
<div class="flex items-center justify-between mt-sm">
<span class="font-price-display text-price-display text-primary">$3.75</span>
<div class="flex items-center bg-surface-container-low rounded-full px-xs py-1 border border-outline">
<button aria-label="Decrease quantity" class="w-8 h-8 flex items-center justify-center text-on-surface hover:bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-[20px]">remove</span>
</button>
<span class="font-title-md text-title-md text-on-surface w-8 text-center">2</span>
<button aria-label="Increase quantity" class="w-8 h-8 flex items-center justify-center text-on-surface hover:bg-surface-container-high rounded-full">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Checkout Area -->
<div class="fixed bottom-0 left-0 right-0 bg-surface rounded-t-xl shadow-[0_-4px_16px_rgba(49,23,11,0.05)] border-t border-outline px-margin py-md pb-[calc(16px+env(safe-area-inset-bottom))] z-40 max-w-2xl mx-auto w-full">
<div class="flex justify-between items-center mb-md">
<span class="font-body-md text-body-md text-on-surface-variant">Subtotal</span>
<span class="font-price-display text-price-display text-primary">$13.00</span>
</div>
<button class="w-full bg-secondary hover:bg-secondary-container text-on-secondary font-title-md text-title-md py-4 rounded-full flex items-center justify-center gap-sm transition-colors active:scale-[0.98]">
            Checkout
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
</body></html>
